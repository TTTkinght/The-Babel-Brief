name: The Babel Brief

on:
  schedule:
    # GitHub cron uses UTC; 00:30 UTC is 08:30 in Asia/Shanghai.
    - cron: "30 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  brief:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate brief
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          GEMINI_MODEL: gemini-3-flash-preview
          BRIEF_TIMEZONE: Asia/Shanghai
          SKIP_NETWORK_PREFLIGHT: "1"
          ALLOW_ENV_PROXY: "0"
          BRIEF_MAX_ATTEMPTS: "2"
          GEMINI_MAX_RETRIES: "2"
          GEMINI_CONNECT_TIMEOUT_SECONDS: "10"
          COMPACT_BRIEF_MODE: "1"
          TODAY_ECHO_ALLOW_LLM_CANDIDATES: "1"
          TODAY_ECHO_LLM_CANDIDATE_BATCHES: "1"
        run: python main.py

      - name: Build static site
        run: python build.py

      - name: Commit generated files
        run: |
          git config user.name "babel-bot"
          git config user.email "bot@babel-brief"
          git add index.html archives/ docs/
          if ! git diff --cached --quiet; then
            git commit -m "brief: $(TZ=Asia/Shanghai date +'%Y-%m-%d')"
            git push
          fi
